<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FluentReply Translator</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: Arial, sans-serif; background: #fff; color: #202124; }
    header { height: 64px; display: flex; align-items: center; justify-content: space-between; padding: 0 28px; border-bottom: 1px solid #e5e7eb; }
    .logo { font-size: 24px; font-weight: 600; color: #1a73e8; }
    .upgrade-btn { background: #1a73e8; color: white; border: none; border-radius: 24px; padding: 10px 18px; cursor: pointer; font-weight: 600; }
    .page { max-width: 1280px; margin: 34px auto; padding: 0 24px; }
    .tabs { display: flex; gap: 12px; margin-bottom: 22px; }
    .tab { border: 1px solid #dadce0; background: white; color: #1a73e8; border-radius: 22px; padding: 10px 20px; font-weight: 600; }
    .tab.active { background: #e8f0fe; }
    .translator { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .panel { border: 1px solid #dadce0; border-radius: 16px; overflow: hidden; min-height: 280px; }
    .panel-header { height: 54px; display: flex; align-items: center; gap: 18px; padding: 0 20px; border-bottom: 1px solid #e5e7eb; color: #5f6368; font-weight: 600; }
    .active-lang { color: #1a73e8; }
    textarea { width: 100%; height: 210px; border: none; outline: none; resize: none; padding: 24px; font-size: 30px; line-height: 1.35; font-family: Arial, sans-serif; }
    .result-box { background: #f1f5ff; min-height: 210px; padding: 24px; font-size: 30px; line-height: 1.35; white-space: pre-wrap; }
    .result-placeholder { color: #6b7280; font-size: 22px; }
    .panel-footer { height: 58px; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; color: #5f6368; border-top: 1px solid #e5e7eb; }
    .icon-btn { border: none; background: transparent; color: #5f6368; font-size: 16px; cursor: pointer; padding: 8px; }
    .suggestions { margin-top: 20px; display: none; }
    .suggestions-title { font-size: 16px; font-weight: 700; margin-bottom: 12px; }
    .suggestion-list { display: grid; gap: 10px; }
    .suggestion { border: 1px solid #dadce0; border-radius: 12px; padding: 16px 18px; cursor: pointer; background: white; display: flex; justify-content: space-between; gap: 14px; align-items: center; }
    .suggestion:hover, .suggestion.selected { background: #e8f0fe; border-color: #1a73e8; }
    .suggestion-text { font-size: 18px; line-height: 1.5; }
    .suggestion-tag { font-size: 13px; color: #5f6368; white-space: nowrap; }
    .bottom-actions { margin-top: 18px; display: flex; gap: 12px; }
    .copy-main { background: #1a73e8; color: white; border: none; border-radius: 20px; padding: 11px 18px; cursor: pointer; font-weight: 600; display: none; }
    .clear-btn { background: white; color: #5f6368; border: 1px solid #dadce0; border-radius: 20px; padding: 11px 18px; cursor: pointer; font-weight: 600; }
    footer { text-align: center; padding: 40px 20px; color: #6b7280; font-size: 14px; }
    @media (max-width: 850px) {
      .translator { grid-template-columns: 1fr; }
      textarea, .result-box { font-size: 24px; }
      .page { padding: 0 14px; }
    }
  </style>
</head>

<body>
  <header>
    <div class="logo">FluentReply 翻译</div>
    <button class="upgrade-btn" onclick="goPro()">Upgrade Pro</button>
  </header>

  <main class="page">
    <div class="tabs">
      <button class="tab active">文字</button>
      <button class="tab">自动翻译</button>
      <button class="tab">多种表达</button>
    </div>

    <section class="translator">
      <div class="panel">
        <div class="panel-header">
          <span class="active-lang">检测到的语言</span>
          <span>中文</span>
          <span>英语</span>
        </div>

        <textarea id="inputText" oninput="autoTranslate()" placeholder="请输入中文或其他语言..."></textarea>

        <div class="panel-footer">
          <span id="charCount">0</span>
          <button class="icon-btn" onclick="clearText()">✕</button>
        </div>
      </div>

      <div class="panel">
        <div class="panel-header">
          <span class="active-lang">英语</span>
          <span>中文</span>
          <span>日语</span>
        </div>

        <div id="resultText" class="result-box">
          <span class="result-placeholder">英文翻译会自动显示在这里</span>
        </div>

        <div class="panel-footer">
          <span id="status">准备自动翻译</span>
          <button class="icon-btn" onclick="copyText()">复制</button>
        </div>
      </div>
    </section>

    <section id="suggestions" class="suggestions">
      <div class="suggestions-title">更多英文表达选择</div>
      <div id="suggestionList" class="suggestion-list"></div>
    </section>

    <div class="bottom-actions">
      <button id="copyMainBtn" class="copy-main" onclick="copyText()">Copy Translation</button>
      <button class="clear-btn" onclick="clearText()">Clear</button>
    </div>
  </main>

  <footer>© 2026 FluentReply. All rights reserved.</footer>

  <script>
    const PAYMENT_LINK = "https://buy.stripe.com/test_7sY28t1xF9fe7qb7iY83C00";
    const FREE_LIMIT = 100;

    let typingTimer;
    let lastInput = "";
    let currentResult = "";
    let isTranslating = false;

    function goPro() {
      window.location.href = PAYMENT_LINK;
    }

    function getUsageCount() {
      return Number(localStorage.getItem("fluentreply_usage") || "0");
    }

    function setUsageCount(count) {
      localStorage.setItem("fluentreply_usage", String(count));
    }

    function autoTranslate() {
      clearTimeout(typingTimer);

      const input = document.getElementById("inputText").value.trim();
      document.getElementById("charCount").textContent = input.length;

      if (!input) {
        clearResultOnly();
        return;
      }

      typingTimer = setTimeout(() => {
        if (input.length >= 2 && input !== lastInput) {
          translateNow();
        }
      }, 900);
    }

    async function translateNow() {
      if (isTranslating) return;

      const input = document.getElementById("inputText").value.trim();
      const resultBox = document.getElementById("resultText");
      const status = document.getElementById("status");

      if (!input) return;

      let usage = getUsageCount();

      if (usage >= FREE_LIMIT) {
        resultBox.textContent = "You have reached the free limit. Please upgrade to Pro.";
        status.textContent = "免费次数已用完";
        return;
      }

      try {
        isTranslating = true;
        status.textContent = "正在使用 AI 翻译...";
        resultBox.textContent = "Translating...";

        const aiResult = await callAITranslate(input);

        usage++;
        setUsageCount(usage);

        currentResult = aiResult.main;
        lastInput = input;

        resultBox.textContent = aiResult.main;
        status.textContent = "翻译完成";
        document.getElementById("copyMainBtn").style.display = "inline-block";

        showAISuggestions(aiResult.options);
      } catch (error) {
        resultBox.textContent = "Translation failed. Please try again.";
        status.textContent = "翻译失败";
      } finally {
        isTranslating = false;
      }
    }

    async function callAITranslate(text) {
      const response = await fetch("/.netlify/functions/translate", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ text })
      });

      const data = await response.json();

      if (!response.ok) {
        throw new Error(data.error || "Translation failed");
      }

      return data;
    }

    function showAISuggestions(options) {
      const section = document.getElementById("suggestions");
      const list = document.getElementById("suggestionList");

      list.innerHTML = "";

      options.forEach((item, index) => {
        const div = document.createElement("div");
        div.className = "suggestion" + (index === 0 ? " selected" : "");
        div.onclick = () => selectSuggestion(item.text, div);

        div.innerHTML = `
          <div class="suggestion-text">${escapeHTML(item.text)}</div>
          <div class="suggestion-tag">${escapeHTML(item.label)}</div>
        `;

        list.appendChild(div);
      });

      section.style.display = "block";
    }

    function selectSuggestion(text, element) {
      currentResult = text;
      document.getElementById("resultText").textContent = text;

      document.querySelectorAll(".suggestion").forEach(item => {
        item.classList.remove("selected");
      });

      element.classList.add("selected");
      document.getElementById("status").textContent = "已选择表达";
    }

    function copyText() {
      if (!currentResult) return;

      navigator.clipboard.writeText(currentResult).then(() => {
        document.getElementById("status").textContent = "已复制";
      });
    }

    function clearText() {
      document.getElementById("inputText").value = "";
      document.getElementById("charCount").textContent = "0";
      clearResultOnly();
    }

    function clearResultOnly() {
      currentResult = "";
      lastInput = "";

      document.getElementById("resultText").innerHTML =
        '<span class="result-placeholder">英文翻译会自动显示在这里</span>';

      document.getElementById("status").textContent = "准备自动翻译";
      document.getElementById("suggestions").style.display = "none";
      document.getElementById("suggestionList").innerHTML = "";
      document.getElementById("copyMainBtn").style.display = "none";
    }

    function escapeHTML(str) {
      return String(str).replace(/[&<>'"]/g, function(tag) {
        const chars = {
          "&": "&amp;",
          "<": "&lt;",
          ">": "&gt;",
          "'": "&#39;",
          '"': "&quot;"
        };
        return chars[tag] || tag;
      });
    }
  </script>
</body>
</html>
