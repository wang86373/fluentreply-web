<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>FluentReply</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #f6f8ff, #eef7f2);
  color: #1f2937;
}

.app {
  max-width: 760px;
  margin: 60px auto;
  padding: 32px;
  background: white;
  border-radius: 24px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.08);
}

.header {
  display: flex;
  gap: 16px;
  align-items: center;
  margin-bottom: 24px;
}

.logo {
  width: 52px;
  height: 52px;
  border-radius: 16px;
  background: #2563eb;
  color: white;
  font-weight: bold;
  display: flex;
  align-items: center;
  justify-content: center;
}

h1 {
  margin: 0;
  font-size: 34px;
}

.subtitle {
  margin: 6px 0 0;
  color: #6b7280;
}

textarea {
  width: 100%;
  height: 150px;
  box-sizing: border-box;
  padding: 16px;
  font-size: 16px;
  border: 1px solid #d1d5db;
  border-radius: 16px;
  resize: vertical;
  outline: none;
}

textarea:focus {
  border-color: #2563eb;
}

.styles {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  margin: 18px 0;
}

.style {
  border: 1px solid #d1d5db;
  background: white;
  border-radius: 999px;
  padding: 10px 14px;
  cursor: pointer;
}

.style.active {
  background: #2563eb;
  color: white;
  border-color: #2563eb;
}

.output-card {
  margin-top: 24px;
  padding: 20px;
  border-radius: 18px;
  background: #f9fafb;
  border: 1px solid #e5e7eb;
}

.output-title {
  display: flex;
  justify-content: space-between;
  margin-bottom: 12px;
  font-weight: bold;
}

.copy {
  border: none;
  background: #111827;
  color: white;
  border-radius: 10px;
  padding: 8px 12px;
  cursor: pointer;
}

.upgrade {
  width: 100%;
  margin-top: 18px;
  padding: 15px;
  border: none;
  border-radius: 16px;
  background: #635bff;
  color: white;
  font-size: 17px;
  cursor: pointer;
}

.upgrade:hover {
  background: #5147e0;
}

#output {
  white-space: pre-wrap;
  line-height: 1.6;
  min-height: 50px;
}
</style>
</head>

<body>

<div class="app">
  <div class="header">
    <div class="logo">FR</div>
    <div>
      <h1>FluentReply</h1>
      <p class="subtitle">把中文或简单英文变成自然的美式英语</p>
    </div>
  </div>

  <textarea id="input" placeholder="输入你想表达的话..."></textarea>

  <div class="styles">
    <button class="style active" onclick="setStyle('Professional', this)">Professional</button>
    <button class="style" onclick="setStyle('Casual', this)">Casual</button>
    <button class="style" onclick="setStyle('Friendly', this)">Friendly</button>
    <button class="style" onclick="setStyle('Confident', this)">Confident</button>
    <button class="style" onclick="setStyle('Romantic', this)">Romantic</button>
    <button class="style" onclick="setStyle('Business', this)">Business</button>
  </div>

  <div class="output-card">
    <div class="output-title">
      <span>Result</span>
      <button class="copy" onclick="copyResult()">Copy</button>
    </div>
    <div id="output">✨ 输入内容后会自动生成结果</div>
  </div>

  <button id="upgradeBtn" class="upgrade" onclick="goUpgrade()" style="display:none;">
    升级 Pro $9.90/月
  </button>
</div>

<script>
const API_URL = "https://fluentreply-api-7t7d.onrender.com";

let selectedStyle = "Professional";
let timer;

// 自动识别支付成功
if (new URLSearchParams(window.location.search).get("success") === "true") {
  localStorage.setItem("isPro", "true");
}

function isPro() {
  return localStorage.getItem("isPro") === "true";
}

function setStyle(style, button) {
  selectedStyle = style;

  document.querySelectorAll(".style").forEach(btn => {
    btn.classList.remove("active");
  });

  button.classList.add("active");

  autoGenerate();
}

document.getElementById("input").addEventListener("input", autoGenerate);

function autoGenerate() {
  clearTimeout(timer);

  const text = document.getElementById("input").value.trim();

  if (!text) {
    document.getElementById("output").innerText = "✨ 输入内容后会自动生成结果";
    return;
  }

  timer = setTimeout(() => {
    generate(text);
  }, 800);
}

async function generate(text) {
  const output = document.getElementById("output");
  output.innerText = "✨ 正在优化表达...";

  try {
    const res = await fetch(`${API_URL}/api/generate`, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        text: `${selectedStyle} style: ${text}`,
        pro: isPro()
      })
    });

    const data = await res.json();

    output.innerText = data.result || "无返回结果";

    if (data.limit) {
      document.getElementById("upgradeBtn").style.display = "block";
    }

  } catch (err) {
    output.innerText = "请求失败：" + err.message;
  }
}

async function goUpgrade() {
  try {
    const res = await fetch(`${API_URL}/api/checkout`, {
      method: "POST"
    });

    const data = await res.json();

    if (data.url) {
      window.location.href = data.url;
    } else {
      alert("支付失败：" + (data.error || "未知错误"));
    }

  } catch (err) {
    alert("请求失败：" + err.message);
  }
}

function copyResult() {
  const text = document.getElementById("output").innerText;
  navigator.clipboard.writeText(text);
  alert("已复制");
}
</script>

</body>
</html>
