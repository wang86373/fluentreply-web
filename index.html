<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>FluentReply</title>

<style>
body {
  font-family: Arial;
  max-width: 600px;
  margin: 50px auto;
  text-align: center;
  background: #f8f9fb;
}

textarea {
  width: 100%;
  height: 120px;
  padding: 10px;
  border-radius: 8px;
  border: 1px solid #ccc;
}

#output {
  margin-top: 20px;
  padding: 15px;
  background: white;
  border-radius: 10px;
}
</style>
</head>

<body>

<h1>FluentReply</h1>
<p>让你的英文更自然</p>

<textarea id="input" placeholder="输入中文或英文"></textarea>

<div id="output"></div>

<script>
let timer;

document.getElementById("input").addEventListener("input", () => {
  clearTimeout(timer);

  const text = document.getElementById("input").value;

  if (!text) return;

  timer = setTimeout(async () => {
    const output = document.getElementById("output");
    output.innerText = "生成中...";

    try {
      const res = await fetch("https://fluentreply-api-7t7d.onrender.com/api/generate", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ text })
      });

      const data = await res.json();

      output.innerText = data.result || "无返回结果";

    } catch (err) {
      output.innerText = "请求失败：" + err.message;
    }

  }, 800); // 停止输入800ms自动翻译
});
</script>

</body>
</html>
